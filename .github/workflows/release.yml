name: Release

on:
  push:
    branches: [ master ]

permissions: read-all

concurrency:
  # Only one release job runs at a time. cancel-in-progress: false means a second
  # push queues rather than being dropped. GitHub keeps at most one pending run per
  # group, so a burst of merges still collapses correctly: the queued run will see
  # all commits accumulated since the tag the running job is about to create.
  group: release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Version, Tag & Build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0  # Full history for conventional commit analysis

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: plugin-core/chat-ui/package-lock.json

      - name: Install chat-ui dependencies
        run: npm ci --silent --ignore-scripts
        working-directory: plugin-core/chat-ui

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
        with:
          cache-disabled: true

      - name: Determine next version
        id: version
        run: |
          # Get the latest tag (semver), or default to 0.0.0
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          # Strip the 'v' prefix
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Analyze commits since the last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${LATEST_TAG}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump type from conventional commits
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE '^[a-z]+(\(.+\))?!:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE 'BREAKING CHANGE'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE '^feat(\(.+\))?:'; then
            BUMP="minor"
          fi

          # Calculate new version
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP → v${NEW_VERSION}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        if: steps.version.outputs.skip != 'true'
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.version }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p build
          bash scripts/generate-changelog.sh > build/changelog.html
          echo "### 📋 Generated Changelog" >> "$GITHUB_STEP_SUMMARY"
          echo '```html' >> "$GITHUB_STEP_SUMMARY"
          cat build/changelog.html >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Build release ZIPs
        if: steps.version.outputs.skip != 'true'
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.version }}
          CHANGELOG_FILE: build/changelog.html
        run: ./gradlew :plugin-core:buildPlugin :plugin-experimental:buildPlugin --no-daemon --quiet

      - name: Collect release artifacts
        if: steps.version.outputs.skip != 'true'
        id: artifacts
        run: |
          # Copy artifacts to a staging directory with predictable names
          mkdir -p release-artifacts
          cp plugin-core/build/distributions/*.zip release-artifacts/
          cp plugin-experimental/build/distributions/*.zip release-artifacts/
          echo "dir=release-artifacts" >> "$GITHUB_OUTPUT"
          ls -la release-artifacts/

      - name: Generate provenance attestation
        if: steps.version.outputs.skip != 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: '${{ steps.artifacts.outputs.dir }}/*.zip'

      - name: Install cosign
        if: steps.version.outputs.skip != 'true'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Sign release artifacts with cosign
        if: steps.version.outputs.skip != 'true'
        env:
          ARTIFACTS_DIR: ${{ steps.artifacts.outputs.dir }}
        run: |
          for artifact in "$ARTIFACTS_DIR"/*.zip; do
            cosign sign-blob --yes \
              --bundle "${artifact}.sigstore.json" \
              "$artifact"
          done

      - name: Authenticate git for tag push
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh auth setup-git

      - name: Create tag and GitHub release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          ARTIFACTS_DIR: ${{ steps.artifacts.outputs.dir }}
        run: |
          # Generate release notes from conventional commits
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            COMMIT_BULLETS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMIT_BULLETS=$(git log --pretty=format:"- %s" "${LATEST_TAG}..HEAD")
          fi

          # Convert the generated changelog HTML to Markdown for the release body.
          # Strip the static header (everything before the version <h3>) and convert
          # <h3> → ##, <li> → bullet points, drop remaining tags.
          CHANGELOG_MD=""
          if [ -f build/changelog.html ]; then
            CHANGELOG_MD=$(sed -n '/<h3>/,$ p' build/changelog.html \
              | sed 's|<h3>\(.*\)</h3>|## \1|' \
              | sed 's|^[[:space:]]*<li>\(.*\)</li>|- \1|' \
              | sed 's|<ul>||g; s|</ul>||g' \
              | sed 's|&mdash;|—|g' \
              | sed '/^$/d')
          fi

          # Assemble release body: changelog first, then raw commit list.
          # Written to a file to avoid YAML/shell quoting issues with --- separator.
          {
            if [ -n "$CHANGELOG_MD" ]; then
              echo "$CHANGELOG_MD"
              echo ""
              echo "---"
              echo ""
              echo "<details><summary>Commits</summary>"
              echo ""
              echo "$COMMIT_BULLETS"
              echo ""
              echo "</details>"
            else
              echo "$COMMIT_BULLETS"
            fi
          } > build/release-notes.md

          # Create tag + release via GitHub API (no git credentials needed;
          # persist-credentials: false is set on checkout for security)
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "Release $TAG" \
            --notes-file build/release-notes.md \
            "$ARTIFACTS_DIR"/*.zip \
            "$ARTIFACTS_DIR"/*.sigstore.json
