name: Release

on:
  push:
    branches: [ master ]

permissions: read-all

concurrency:
  # Only one release job runs at a time. cancel-in-progress: false means a second
  # push queues rather than being dropped. GitHub keeps at most one pending run per
  # group, so a burst of merges still collapses correctly: the queued run will see
  # all commits accumulated since the tag the running job is about to create.
  group: release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Version, Tag & Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # Full history for conventional commit analysis

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: plugin-core/chat-ui/package-lock.json

      - name: Install chat-ui dependencies
        run: npm ci --silent --ignore-scripts
        working-directory: plugin-core/chat-ui

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
        with:
          cache-disabled: true

      - name: Determine next version
        id: version
        run: |
          # Get the latest tag (semver), or default to 0.0.0
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          # Strip the 'v' prefix
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Analyze commits since the last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${LATEST_TAG}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump type from conventional commits
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE '^[a-z]+(\(.+\))?!:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE 'BREAKING CHANGE'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE '^feat(\(.+\))?:'; then
            BUMP="minor"
          fi

          # Calculate new version
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP → v${NEW_VERSION}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Build release ZIPs
        if: steps.version.outputs.skip != 'true'
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.version }}
        run: ./gradlew :plugin-core:buildPlugin :plugin-experimental:buildPlugin --no-daemon --quiet

      - name: Collect release artifacts
        if: steps.version.outputs.skip != 'true'
        id: artifacts
        run: |
          # Copy artifacts to a staging directory with predictable names
          mkdir -p release-artifacts
          cp plugin-core/build/distributions/*.zip release-artifacts/
          cp plugin-experimental/build/distributions/*.zip release-artifacts/
          echo "dir=release-artifacts" >> "$GITHUB_OUTPUT"
          ls -la release-artifacts/

      - name: Generate provenance attestation
        if: steps.version.outputs.skip != 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: '${{ steps.artifacts.outputs.dir }}/*.zip'

      - name: Install cosign
        if: steps.version.outputs.skip != 'true'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Sign release artifacts with cosign
        if: steps.version.outputs.skip != 'true'
        run: |
          for artifact in ${{ steps.artifacts.outputs.dir }}/*.zip; do
            cosign sign-blob --yes \
              --bundle "${artifact}.sigstore.json" \
              "$artifact"
          done

      - name: Create tag and GitHub release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

          # Generate release notes from conventional commits
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n2 | tail -n1)
          if [ "$LATEST_TAG" = "$TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s" "${LATEST_TAG}..HEAD~0")
          fi

          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes "$NOTES" \
            ${{ steps.artifacts.outputs.dir }}/*.zip \
            ${{ steps.artifacts.outputs.dir }}/*.sigstore.json
