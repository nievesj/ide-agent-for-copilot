name: CI

on:
  pull_request:
    branches: [ master ]

permissions: read-all

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a  # v4

  mcp-server-tests:
    name: MCP Server Tests
    runs-on: ubuntu-latest
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a  # v4
        with:
          cache-disabled: true

      - name: Run MCP server tests
        run: ./gradlew :mcp-server:test --no-daemon --quiet --build-cache

  build-and-test:
    name: Build, Test & Verify
    runs-on: ubuntu-latest
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            plugin-core/chat-ui/package-lock.json
            plugin-core/js-tests/package-lock.json

      - name: Install chat-ui dependencies
        run: npm ci --silent
        working-directory: plugin-core/chat-ui

      - name: Install JS test dependencies
        run: npm ci --silent
        working-directory: plugin-core/js-tests

      - name: Build chat-ui
        run: npm run build
        working-directory: plugin-core/chat-ui

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a  # v4
        with:
          cache-disabled: true

      - name: Generate chat resources
        run: ./gradlew :plugin-core:processResources --no-daemon --quiet

      - name: Run chat-ui tests
        run: npm test
        working-directory: plugin-core/js-tests

      - name: Build plugins
        run: ./gradlew :plugin-core:buildPlugin :plugin-experimental:buildPlugin --no-daemon --quiet

      - name: Run plugin tests
        run: ./gradlew :plugin-core:test --no-daemon

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: plugin-core/build/reports/jacoco/test/jacocoTestReport.xml
          flags: plugin-core
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Show test failures
        if: failure()
        run: |
          python3 -c "
          import glob, xml.etree.ElementTree as ET
          for path in glob.glob('plugin-core/build/test-results/test/*.xml'):
              root = ET.parse(path).getroot()
              for tc in root.iter('testcase'):
                  for tag in ('failure', 'error'):
                      fail = tc.find(tag)
                      if fail is not None:
                          print('FAILED:', tc.get('classname') + '.' + tc.get('name'))
                          print((fail.get('message') or '') + chr(10) + (fail.text or '')[:3000])
          "

      - name: Create pluginVerifier cache directory
        run: mkdir -p ~/.pluginVerifier/extracted-plugins

      - name: Verify plugins (marketplace compatibility)
        run: ./gradlew :plugin-core:verifyPlugin --no-daemon --quiet

      - name: Upload plugin-core artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: plugin-core-pr-${{ github.event.pull_request.number }}
          path: plugin-core/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 7
