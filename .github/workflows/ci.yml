name: CI

on:
  pull_request:
    branches: [ master ]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  mcp-server-tests:
    name: MCP Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run MCP server tests
        run: ./gradlew :mcp-server:test --no-daemon

  build-and-test:
    name: Build, Test & Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            plugin-core/chat-ui/package-lock.json
            plugin-core/js-tests/package-lock.json

      - name: Install chat-ui dependencies
        run: npm ci
        working-directory: plugin-core/chat-ui

      - name: Install JS test dependencies
        run: npm ci
        working-directory: plugin-core/js-tests

      - name: Build chat-ui
        run: npm run build
        working-directory: plugin-core/chat-ui

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate chat resources
        run: ./gradlew :plugin-core:processResources --no-daemon

      - name: Run chat-ui tests
        run: npm test
        working-directory: plugin-core/js-tests

      - name: Build plugins
        run: ./gradlew :plugin-core:buildPlugin :standalone-mcp:buildPlugin --no-daemon

      - name: Run plugin tests
        run: ./gradlew :plugin-core:test --no-daemon

      - name: Verify plugins (marketplace compatibility)
        run: ./gradlew :plugin-core:verifyPlugin :standalone-mcp:verifyPlugin --no-daemon

      - name: Upload plugin-core artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-core-pr-${{ github.event.pull_request.number }}
          path: plugin-core/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 7

      - name: Upload standalone-mcp artifact
        uses: actions/upload-artifact@v4
        with:
          name: standalone-mcp-pr-${{ github.event.pull_request.number }}
          path: standalone-mcp/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 7
